name: Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run (Mondays 06:00 UTC) to detect new advisories
    # against an otherwise-unchanged lockfile before unrelated work merges.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: dependency-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit mobile dependencies
        working-directory: mobile
        run: npm audit --audit-level=high
