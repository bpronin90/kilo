name: Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run (Mondays 06:00 UTC) to detect new advisories
    # against an otherwise-unchanged lockfile before unrelated work merges.
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit mobile dependencies
        working-directory: mobile
        run: npm audit --audit-level=high
