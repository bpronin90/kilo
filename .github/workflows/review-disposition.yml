name: Review Disposition

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

concurrency:
  group: review-disposition-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  evaluate:
    name: evaluate current head review disposition
    if: github.event_name == 'pull_request_target' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted evaluator
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Evaluate and publish review disposition
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/review-disposition.mjs
