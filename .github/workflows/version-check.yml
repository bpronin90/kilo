name: Version Sync

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: version-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: mobile version matches canonical root
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - name: Check mobile versions are aligned with root package.json
        run: node scripts/sync-version.mjs --check

      - name: Validate changelog fragments
        run: node scripts/changelog-fragments.mjs check
